[build]
buildCommand = "npm run build"

[volumes]
data = "/data"

[cron.verify-lottery]
schedule = "30 13,15,20 * * *"
command = "curl -H 'Authorization: Bearer $CRON_SECRET' https://motivated-fulfillment-production-1d77.up.railway.app/api/cron/verify-lottery"

[cron.verify-sports]
schedule = "0 * * * *"
command = "curl -H 'Authorization: Bearer $CRON_SECRET' https://motivated-fulfillment-production-1d77.up.railway.app/api/cron/verify-sports"

[cron.sync-matches]
schedule = "*/5 * * * *"
command = "curl -H 'Authorization: Bearer $CRON_SECRET' https://motivated-fulfillment-production-1d77.up.railway.app/api/cron/sync-matches"

[build]
builder = "nixpacks"
buildCommand = "npm run build"
startCommand = "next start"

[volumes]
data = "/data"

[cron.verify-lottery]
schedule = "30 13,15,20 * * *"
command = "curl -H 'Authorization: Bearer $CRON_SECRET' https://predict-ai-production.up.railway.app/api/cron/verify-lottery"

[cron.verify-sports]
schedule = "0 * * * *"
command = "curl -H 'Authorization: Bearer $CRON_SECRET' https://predict-ai-production.up.railway.app/api/cron/verify-sports"

[cron.sync-matches]
schedule = "*/5 * * * *"
command = "curl -H 'Authorization: Bearer $CRON_SECRET' https://predict-ai-production.up.railway.app/api/cron/sync-matches"

[cron.sync-news]
schedule = "0 0,8,16 * * *"
command = "curl -H 'Authorization: Bearer $CRON_SECRET' https://predict-ai-production.up.railway.app/api/cron/sync-news"
